<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ダッシュボード | ネイルサロン管理</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap');
  :root{--cream:#faf7f2;--beige:#f0ebe0;--taupe:#c9b99a;--brown:#8b6f47;--dark:#3d2b1a;--rose:#c9888a;--pink:#f5e6e6;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--cream);color:var(--dark);font-family:'Noto Sans JP',sans-serif;font-weight:300;min-height:100vh;}

  nav{background:#fff;border-bottom:1px solid #ece4d8;padding:0 20px;display:flex;align-items:center;gap:0;position:sticky;top:0;z-index:10;}
  .nav-logo{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:16px;color:var(--rose);padding:14px 0;flex:1;}
  .nav-links{display:flex;gap:4px;}
  .nav-links a{padding:14px 12px;font-size:12px;color:var(--taupe);text-decoration:none;transition:color .2s;}
  .nav-links a.active,.nav-links a:hover{color:var(--brown);}
  .nav-logout{font-size:12px;color:var(--taupe);background:none;border:none;cursor:pointer;padding:14px 0 14px 12px;}

  .page{max-width:640px;margin:0 auto;padding:28px 20px 60px;}

  .greeting{margin-bottom:28px;}
  .greeting-sub{font-size:12px;color:var(--taupe);letter-spacing:.05em;}
  .greeting h2{font-size:22px;font-weight:400;color:var(--dark);margin-top:4px;}

  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:28px;}
  .stat-card{background:#fff;border-radius:12px;padding:18px 14px;text-align:center;border:1px solid #ece4d8;}
  .stat-num{font-family:'Cormorant Garamond',serif;font-size:32px;color:var(--brown);}
  .stat-label{font-size:11px;color:var(--taupe);margin-top:4px;}

  .section-title{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:17px;color:var(--brown);margin-bottom:14px;display:flex;align-items:center;gap:8px;}
  .section-title::after{content:'';flex:1;height:1px;background:var(--taupe);opacity:.4;}

  .alert-card{background:#fff;border-radius:12px;border-left:3px solid var(--rose);padding:14px 16px;margin-bottom:10px;display:flex;gap:12px;align-items:flex-start;}
  .alert-icon{font-size:18px;flex-shrink:0;}
  .alert-name{font-size:14px;font-weight:500;color:var(--dark);}
  .alert-text{font-size:12px;color:var(--taupe);margin-top:3px;}
  .alert-action{margin-left:auto;flex-shrink:0;}
  .alert-btn{background:var(--pink);color:var(--rose);border:none;border-radius:20px;padding:5px 12px;font-size:11px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;}

  .new-card{background:#fff;border-radius:12px;padding:14px 16px;margin-bottom:10px;border:1px solid #ece4d8;display:flex;justify-content:space-between;align-items:center;}
  .new-name{font-size:14px;font-weight:500;color:var(--dark);}
  .new-meta{font-size:11px;color:var(--taupe);margin-top:3px;}
  .chip{background:var(--beige);color:var(--brown);font-size:11px;padding:3px 10px;border-radius:20px;}

  .empty{text-align:center;padding:30px 20px;color:var(--taupe);font-size:13px;}
  .cta-link{display:block;text-align:center;margin-top:28px;padding:14px;background:var(--brown);color:#fff;border-radius:8px;text-decoration:none;font-size:14px;letter-spacing:.05em;}
</style>
</head>
<body>

<nav>
  <div class="nav-logo">Nail Salon</div>
  <div class="nav-links">
    <a href="dashboard.html" class="active">ホーム</a>
    <a href="clients.html">顧客</a>
    <a href="settings.html">設定</a>
  </div>
  <button class="nav-logout" onclick="logout()">ログアウト</button>
</nav>

<div class="page">
  <div class="greeting">
    <div class="greeting-sub" id="dateLabel"></div>
    <h2 id="salonName">ダッシュボード</h2>
  </div>

  <div class="stats">
    <div class="stat-card">
      <div class="stat-num" id="totalCount">0</div>
      <div class="stat-label">総顧客数</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="thisMonthCount">0</div>
      <div class="stat-label">今月の新規</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="followCount">0</div>
      <div class="stat-label">フォロー推奨</div>
    </div>
  </div>

  <div class="section-title">Follow Up フォロー推奨</div>
  <div id="followList"><div class="empty">フォロー対象のお客様はいません</div></div>

  <div class="section-title" style="margin-top:28px;">New Clients 最近の新規</div>
  <div id="newList"><div class="empty">新規のお客様はまだいません</div></div>

  <a href="customer-form.html" class="cta-link" target="_blank">＋ 新しいアンケートを開く（お客様に共有）</a>
</div>

<script>
  if(!sessionStorage.getItem('nail_logged_in')) location.href='login.html';

  const now = new Date();
  document.getElementById('dateLabel').textContent = now.toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric',weekday:'long'});
  const salon = localStorage.getItem('nail_salon_name') || 'ネイルサロン';
  document.getElementById('salonName').textContent = salon + ' 管理画面';

  const clients = JSON.parse(localStorage.getItem('nail_clients') || '[]');
  document.getElementById('totalCount').textContent = clients.length;

  const thisMonth = clients.filter(c => {
    const d = new Date(c.submittedAt);
    return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
  });
  document.getElementById('thisMonthCount').textContent = thisMonth.length;

  // フォロー推奨（最終来店から30日以上）
  const follows = clients.filter(c => {
    const visits = c.visitHistory || [];
    if(visits.length === 0) return true;
    const lastVisit = new Date(visits[visits.length-1].date);
    const diff = (now - lastVisit) / (1000*60*60*24);
    return diff >= 30;
  });
  document.getElementById('followCount').textContent = follows.length;

  const followList = document.getElementById('followList');
  if(follows.length > 0){
    followList.innerHTML = follows.slice(0,5).map(c => {
      const visits = c.visitHistory || [];
      const lastDate = visits.length > 0 ? visits[visits.length-1].date : c.submittedAt.split(' ')[0];
      const diff = Math.floor((now - new Date(lastDate)) / (1000*60*60*24));
      return `<div class="alert-card">
        <div class="alert-icon">💅</div>
        <div>
          <div class="alert-name">${c.name} 様</div>
          <div class="alert-text">最終来店から約${diff}日｜${c.menu}</div>
        </div>
        <div class="alert-action">
          <button class="alert-btn" onclick="location.href='client-detail.html?id=${c.id}'">詳細</button>
        </div>
      </div>`;
    }).join('');
  }

  const newList = document.getElementById('newList');
  const recent = [...clients].reverse().slice(0,5);
  if(recent.length > 0){
    newList.innerHTML = recent.map(c => `
      <div class="new-card" onclick="location.href='client-detail.html?id=${c.id}'" style="cursor:pointer;">
        <div>
          <div class="new-name">${c.name} 様</div>
          <div class="new-meta">${c.submittedAt}｜${c.howFound || '来店'}</div>
        </div>
        <span class="chip">${c.menu || '未定'}</span>
      </div>`).join('');
  }

  function logout(){ sessionStorage.removeItem('nail_logged_in'); location.href='login.html'; }
</script>
</body>
</html>
