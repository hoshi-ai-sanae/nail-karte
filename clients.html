<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>顧客一覧 | ネイルサロン管理</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap');
  :root{--cream:#faf7f2;--beige:#f0ebe0;--taupe:#c9b99a;--brown:#8b6f47;--dark:#3d2b1a;--rose:#c9888a;--pink:#f5e6e6;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--cream);color:var(--dark);font-family:'Noto Sans JP',sans-serif;font-weight:300;min-height:100vh;}

  nav{background:#fff;border-bottom:1px solid #ece4d8;padding:0 20px;display:flex;align-items:center;gap:0;position:sticky;top:0;z-index:10;}
  .nav-logo{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:16px;color:var(--rose);padding:14px 0;flex:1;}
  .nav-links{display:flex;gap:4px;}
  .nav-links a{padding:14px 12px;font-size:12px;color:var(--taupe);text-decoration:none;transition:color .2s;}
  .nav-links a.active,.nav-links a:hover{color:var(--brown);}
  .nav-logout{font-size:12px;color:var(--taupe);background:none;border:none;cursor:pointer;padding:14px 0 14px 12px;}

  .page{max-width:640px;margin:0 auto;padding:24px 20px 60px;}
  .page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
  .page-title{font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--brown);}

  .search-bar{position:relative;margin-bottom:14px;}
  .search-bar input{width:100%;padding:11px 14px 11px 40px;border:1px solid #ddd4c8;border-radius:8px;font-family:'Noto Sans JP',sans-serif;font-size:14px;outline:none;background:#fff;}
  .search-bar input:focus{border-color:var(--rose);}
  .search-bar::before{content:'🔍';position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:13px;}

  .filter-row{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;}
  .filter-btn{padding:6px 14px;border-radius:20px;border:1px solid #ddd4c8;background:#fff;font-size:12px;color:var(--brown);cursor:pointer;font-family:'Noto Sans JP',sans-serif;transition:all .15s;}
  .filter-btn.active{background:var(--brown);color:#fff;border-color:var(--brown);}

  .client-card{background:#fff;border-radius:12px;padding:16px;margin-bottom:10px;border:1px solid #ece4d8;cursor:pointer;transition:box-shadow .15s;display:flex;gap:14px;align-items:flex-start;}
  .client-card:hover{box-shadow:0 2px 12px rgba(139,111,71,.1);}
  .avatar{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--pink),var(--beige));display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
  .client-info{flex:1;}
  .client-name{font-size:15px;font-weight:500;color:var(--dark);}
  .client-meta{font-size:12px;color:var(--taupe);margin-top:4px;}
  .client-chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;}
  .chip{background:var(--beige);color:var(--brown);font-size:11px;padding:3px 10px;border-radius:20px;}
  .chip-concern{background:var(--pink);color:var(--rose);}
  .client-arrow{color:var(--taupe);align-self:center;}

  .empty{text-align:center;padding:60px 20px;color:var(--taupe);font-size:13px;}
  .count-label{font-size:12px;color:var(--taupe);margin-bottom:14px;}
</style>
</head>
<body>

<nav>
  <div class="nav-logo">Nail Salon</div>
  <div class="nav-links">
    <a href="dashboard.html">ホーム</a>
    <a href="clients.html" class="active">顧客</a>
    <a href="settings.html">設定</a>
  </div>
  <button class="nav-logout" onclick="logout()">ログアウト</button>
</nav>

<div class="page">
  <div class="page-header">
    <div class="page-title">顧客一覧</div>
  </div>

  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="お名前・電話番号で検索" oninput="render()">
  </div>

  <div class="filter-row">
    <button class="filter-btn active" data-menu="all" onclick="setFilter(this)">すべて</button>
    <button class="filter-btn" data-menu="ジェルネイル" onclick="setFilter(this)">ジェルネイル</button>
    <button class="filter-btn" data-menu="オフ" onclick="setFilter(this)">オフ</button>
    <button class="filter-btn" data-menu="フットネイル" onclick="setFilter(this)">フットネイル</button>
    <button class="filter-btn" data-menu="ハンドケア" onclick="setFilter(this)">ハンドケア</button>
  </div>

  <div class="count-label" id="countLabel"></div>
  <div id="clientList"></div>
</div>

<script>
  if(!sessionStorage.getItem('nail_logged_in')) location.href='login.html';

  let currentMenu = 'all';
  const clients = JSON.parse(localStorage.getItem('nail_clients') || '[]');

  function setFilter(btn){
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentMenu = btn.dataset.menu;
    render();
  }

  function render(){
    const q = document.getElementById('searchInput').value.trim().toLowerCase();
    let list = [...clients].reverse();
    if(currentMenu !== 'all') list = list.filter(c => c.menu === currentMenu);
    if(q) list = list.filter(c => c.name.toLowerCase().includes(q) || (c.phone||'').includes(q));

    document.getElementById('countLabel').textContent = list.length + '名';

    if(list.length === 0){
      document.getElementById('clientList').innerHTML = '<div class="empty">該当するお客様が見つかりません</div>';
      return;
    }

    document.getElementById('clientList').innerHTML = list.map(c => {
      const visits = c.visitHistory || [];
      const lastDate = visits.length > 0 ? visits[visits.length-1].date : c.submittedAt?.split(' ')[0] || '';
      const concerns = (c.nailConcerns || '').split('、').filter(Boolean);
      return `<div class="client-card" onclick="location.href='client-detail.html?id=${c.id}'">
        <div class="avatar">💅</div>
        <div class="client-info">
          <div class="client-name">${c.name} 様</div>
          <div class="client-meta">来店 ${visits.length}回｜最終: ${lastDate}｜${c.phone||''}</div>
          <div class="client-chips">
            ${c.menu ? `<span class="chip">${c.menu}</span>` : ''}
            ${concerns.filter(x=>x&&x!=='特になし').map(x=>`<span class="chip chip-concern">${x}</span>`).join('')}
          </div>
        </div>
        <div class="client-arrow">›</div>
      </div>`;
    }).join('');
  }

  render();
  function logout(){ sessionStorage.removeItem('nail_logged_in'); location.href='login.html'; }
</script>
</body>
</html>
